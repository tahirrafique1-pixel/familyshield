<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Shield GPS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { --glass: rgba(255, 255, 255, 0.12); --accent: #00f2ff; --blur: blur(20px); }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #05050a; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* The Map */
#map { flex: 1; width: 100%; z-index: 10; }

/* Admin Gear Button */
#admin-entry-btn {
position: fixed;
bottom: 30px;
right: 30px;
z-index: 9999;
width: 55px;
height: 55px;
border-radius: 50%;
background: rgba(0, 242, 255, 0.2);
backdrop-filter: var(--blur);
-webkit-backdrop-filter: var(--blur);
color: white;
border: 2px solid var(--accent);
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
transition: transform 0.2s;
}
#admin-entry-btn:active { transform: scale(0.9); }

/* Overlays */
.overlay { position: fixed; inset: 0; z-index: 10000; background: rgba(5,5,10,0.95); backdrop-filter: var(--blur); display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 320px; text-align: center; }

#admin-panel { position: fixed; inset: 0; z-index: 10001; background: #05050a; overflow-y: auto; padding: 20px; display: none; }

input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; }
button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #05050a; margin-top: 10px; }

.user-row { background: var(--glass); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); }
.u-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
.hidden { display: none !important; }
#photo-status { font-size: 0.7rem; color: #00f2ff; margin-top: 5px; }
</style>
</head>
<body onload="checkUser()">

<div id="admin-entry-btn" onclick="showAdminLogin()">⚙️</div>

<div id="overlay" class="overlay">
<div class="card">
<h2 style="color:var(--accent); margin:0 0 10px 0;">Family Shield</h2>
<div id="reg-form">
<div onclick="document.getElementById('f-photo').click()"
style="width:80px; height:80px; border-radius:50%; background:#222; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; border:2px dashed var(--accent); cursor:pointer; overflow:hidden;">
<img id="preview-img" style="width:100%; height:100%; object-fit:cover; display:none;">
<span id="placeholder-icon" style="font-size:24px;">📷</span>
</div>

<input type="file" id="f-photo" accept="image/*" style="display:none;" onchange="loadImg(this)">

<input type="text" id="f-name" placeholder="Full Name">
<input type="text" id="f-phone" placeholder="03XX-XXXXXXX">
<button onclick="register()">Register Device</button> <span><div id="admin-entry-btn" onclick="showAdminLogin()">⚙️</div></span>
</div>
    <p id="msg" style="color:#ffca28; font-size:0.8rem;"></p>
</div>
</div>

<div id="admin-panel">
<div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
<h2 style="color:var(--accent); margin:0;">Admin Console</h2>
<button onclick="closeAdmin()" style="width:auto; padding:8px 20px; background:#333; color:white;">Back</button>
</div>
<div id="admin-list">Loading members...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = "https://script.google.com/macros/s/AKfycbyKSJeuJsI8VCqp93YOp8U0C3bZ_ZhC606JOo1p4D-gtsH7xg1P9z1GJkZ8bVXH3U2SjA/exec";
const ADMIN_PIN = "786605";
let user = null, photoData = "";
let currentLat = 0, currentLng = 0;

const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30.37, 69.34], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// NEW: Function to request photo from App Inventor
function pickPhotoFromApp() {
    if (window.AppInventor && window.AppInventor.pickPhoto) {
        window.AppInventor.pickPhoto();
    } else {
        alert("Please use the app's photo picker button");
    }
}

// NEW: Function to receive photo from App Inventor
function receivePhotoFromApp(photoBase64) {
    photoData = photoBase64;
    document.getElementById('photo-status').innerHTML = "✅ Photo selected!";
    document.getElementById('photo-status').style.color = "#4caf50";
    console.log("Photo received, size: " + photoData.length);
}

// NEW: Function to receive GPS from App Inventor
function receiveGPSFromApp(lat, lng) {
    currentLat = lat;
    currentLng = lng;
    
    // Update map if user is approved
    if (document.getElementById('overlay').classList.contains('hidden')) {
        updateLocationOnMap(lat, lng);
    }
}

function updateLocationOnMap(lat, lng) {
    if (lat && lng && lat !== 0 && lng !== 0) {
        // Clear existing markers except admin marker
        map.eachLayer(function(layer) {
            if (layer instanceof L.Marker && layer.options.title !== 'admin') {
                map.removeLayer(layer);
            }
        });
        
        // Add user marker
        L.marker([lat, lng])
            .addTo(map)
            .bindPopup('<b>Your Location</b><br>Updated: ' + new Date().toLocaleTimeString())
            .openPopup();
        
        map.setView([lat, lng], 13);
    }
}

// Update your loadImg function to show the preview
function loadImg(el) {
if (el.files && el.files[0]) {
const reader = new FileReader();
reader.onload = e => {
photoData = e.target.result;
document.getElementById('preview-img').src = photoData;
document.getElementById('preview-img').style.display = 'block';
document.getElementById('placeholder-icon').style.display = 'none';
};
reader.readAsDataURL(el.files[0]);
}
}
function checkUser() {
    const saved = localStorage.getItem('shield_auth');
    if (saved) {
        user = JSON.parse(saved);
        document.getElementById('reg-form').classList.add('hidden');
        sync();
    }
}

function register() {
    const name = document.getElementById('f-name').value;
    const phone = document.getElementById('f-phone').value;
    if(!name || !phone) return alert("Name and Phone required");
    if(!photoData) return alert("Please select a photo first!");
    
    user = { name, phone, photo: photoData };
    localStorage.setItem('shield_auth', JSON.stringify({name, phone}));
    document.getElementById('reg-form').classList.add('hidden');
    sync();
}

async function sync() {
    let lat = currentLat;
    let lng = currentLng;
    
    // Try to get GPS from App Inventor if available
    if (window.AppInventor && window.AppInventor.getWebViewString) {
        try {
            const gpsString = window.AppInventor.getWebViewString();
            if (gpsString && gpsString.includes(",")) {
                const parts = gpsString.split(",");
                if (parts.length === 2 && !isNaN(parseFloat(parts[0]))) {
                    lat = parseFloat(parts[0]);
                    lng = parseFloat(parts[1]);
                    currentLat = lat;
                    currentLng = lng;
                }
            }
        } catch(e) { console.log("GPS not available"); }
    }
    
    try {
        const payload = {
            name: user?.name || "",
            phone: user?.phone || "",
            photo: photoData || user?.photo || "",
            lat: lat,
            lng: lng,
            timestamp: new Date().toISOString()
        };
        
        const res = await fetch(API, { 
            method: 'POST', 
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        
        if (data.status === "Approved") {
            document.getElementById('overlay').classList.add('hidden');
            updateLocationOnMap(lat, lng);
            
            // Notify App Inventor that user is approved
            if (window.AppInventor && window.AppInventor.sendStatus) {
                window.AppInventor.sendStatus("approved");
            }
        } else {
            document.getElementById('msg').innerText = "Status: " + (data.status || "Pending Approval");
        }
        
        // Clear photo after registration to save memory
        if (photoData && data.status === "Approved") {
            photoData = null;
        }
        
    } catch(e) { 
        console.log("Sync error:", e); 
    }
    setTimeout(sync, 15000);
}

function showAdminLogin() {
    const pin = prompt("Enter Admin PIN:");
    if (pin === ADMIN_PIN) {
        document.getElementById('admin-panel').style.display = 'block';
        loadAdminList();
    } else if(pin !== null) {
        alert("Incorrect PIN");
    }
}

function closeAdmin() { 
    document.getElementById('admin-panel').style.display = 'none'; 
}

async function loadAdminList() {
    try {
        const res = await fetch(API);
        const users = await res.json();
        const list = document.getElementById('admin-list');
        list.innerHTML = '';
        
        if (users.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:20px;">No users found</div>';
            return;
        }
        
        users.forEach(u => {
            const [name, phone, email, lat, lng, time, photo, status] = u;
            const div = document.createElement('div');
            div.className = 'user-row';
            div.innerHTML = `
                <img src="${photo || ''}" class="u-img" onerror="this.src='https://via.placeholder.com/50'">
                <div style="flex:1">
                    <div style="font-weight:bold; font-size:0.9rem;">${name}</div>
                    <div style="font-size:0.7rem; opacity:0.6">${status} | ${phone}</div>
                    ${lat && lng ? `<div style="font-size:0.6rem; opacity:0.5">📍 ${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}</div>` : ''}
                </div>
                <div style="display:flex; gap:4px;">
                    <button style="width:auto; padding:5px; font-size:10px; background:#4caf50;" onclick="updateUser('${phone}','Approved')">✓</button>
                    <button style="width:auto; padding:5px; font-size:10px; background:#f44336;" onclick="updateUser('${phone}','Rejected')">✗</button>
                </div>
            `;
            list.appendChild(div);
        });
    } catch(e) {
        console.log("Admin load error:", e);
        document.getElementById('admin-list').innerHTML = '<div style="text-align:center; padding:20px;">Error loading users</div>';
    }
}

async function updateUser(phone, newStatus) {
    await fetch(API, { 
        method: 'POST', 
        body: JSON.stringify({ action: "updateStatus", phone, newStatus }),
        headers: { 'Content-Type': 'application/json' }
    });
    loadAdminList();
}

// NEW: Bridge to App Inventor
window.AppInventor = window.AppInventor || {};
window.AppInventor.getWebViewString = function() {
    return window._webViewString || "";
};

window.AppInventor.pickPhoto = function() {
    window._webViewString = "pickPhoto";
    if (window.AppInventor.webViewStringChange) {
        window.AppInventor.webViewStringChange();
    }
};

window.AppInventor.sendStatus = function(status) {
    console.log("Status:", status);
};

// Listen for WebViewString updates
setInterval(function() {
    if (window._webViewString && window._webViewString !== window._lastString) {
        window._lastString = window._webViewString;
        
        if (window._webViewString.startsWith("data:image")) {
            receivePhotoFromApp(window._webViewString);
        } else if (window._webViewString.includes(",") && !window._webViewString.startsWith("pick")) {
            var parts = window._webViewString.split(",");
            if (parts.length === 2 && !isNaN(parseFloat(parts[0]))) {
                receiveGPSFromApp(parseFloat(parts[0]), parseFloat(parts[1]));
            }
        }
    }
}, 500);
</script>
</body>
</html>
