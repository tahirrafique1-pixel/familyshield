<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { --glass: rgba(255, 255, 255, 0.1); --accent: #00f2ff; --blur: blur(15px); }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0b14; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#map { flex: 1; width: 100%; }
#overlay { position: fixed; inset: 0; z-index: 5000; background: rgba(11,11,20,0.95); backdrop-filter: var(--blur); display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.card { background: var(--glass); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 320px; }
input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b0b14; margin-top: 10px; }
.hidden { display: none !important; }
#status-msg { font-size: 0.9rem; color: #ffca28; margin-top: 15px; }
</style>
</head>
<body onload="init()">
<div id="overlay">
<div class="card" id="form-container">
<h2 id="title">Family Shield</h2>
<div id="reg-fields">
<input type="file" id="p-input" accept="image/*" onchange="readImg(this)">
<input type="text" id="p-name" placeholder="Full Name">
<input type="text" id="p-phone" placeholder="03XX-XXXXXXX">
<button onclick="doReg()">Register</button>
</div>
<p id="status-msg"></p>
</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = "https://script.google.com/macros/s/AKfycbwQV3uTo4INVcNZNaCKMZQ_KVeAq82P6L9Loxto1aXEowBfvT8Q6Wj4xF7CoqqY5LSlBQ/exec";
let user = null, imgBase64 = "", active = false;
const map = L.map('map').setView([30.37, 69.34], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

function readImg(input) {
const reader = new FileReader();
reader.onload = e => imgBase64 = e.target.result;
reader.readAsDataURL(input.files[0]);
}

function init() {
const saved = localStorage.getItem('shield_user');
if (saved) {
user = JSON.parse(saved);
document.getElementById('reg-fields').classList.add('hidden');
document.getElementById('status-msg').innerText = "Checking authorization...";
sync();
}
}

function doReg() {
const name = document.getElementById('p-name').value;
const phone = document.getElementById('p-phone').value;
if(!name || !phone || !imgBase64) return alert("Fields & Photo required");
user = { name, phone, photo: imgBase64 };
localStorage.setItem('shield_user', JSON.stringify({name, phone}));
document.getElementById('reg-fields').classList.add('hidden');
sync();
}

async function sync() {
let lat = 0, lng = 0;
if (window.AppInventor) {
const gps = window.AppInventor.getWebViewString().split(",");
lat = parseFloat(gps[0]); lng = parseFloat(gps[1]);
}
try {
const res = await fetch(API, { method: 'POST', body: JSON.stringify({...user, lat, lng}) });
const result = await res.json();

if (result.status === "Approved") {
document.getElementById('overlay').classList.add('hidden');
active = true;
} else {
document.getElementById('status-msg').innerText = "Account Status: " + result.status;
document.getElementById('overlay').classList.remove('hidden');
active = false;
}
user.photo = null; // Don't resend photo
} catch(e) { console.log("Retrying..."); }
setTimeout(sync, 15000);
}
</script>
</body>
</html>
